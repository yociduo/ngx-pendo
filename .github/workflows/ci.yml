# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Angular CI Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install package
        run: pnpm install --frozen-lockfile

      - name: Lint check
        run: pnpm lint

      - name: Building check
        run: pnpm build:lib && pnpm build:schematics

      - name: Unit Test check
        run: pnpm test:ci && pnpm test:schematics

      - name: ngx-pendo Library Coverage Report
        if: matrix.node-version == '22.x' && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: 'ngx-pendo (Lib)'
          json-summary-path: './coverage/ngx-pendo/coverage-summary.json'
          json-final-path: './coverage/ngx-pendo/coverage-final.json'
          vite-config-path: './vitest-base.config.ts'

      - name: ngx-pendo Schematics Coverage Report
        if: matrix.node-version == '22.x' && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: 'ngx-pendo (Schematics)'
          json-summary-path: './coverage/ngx-pendo-schematics/coverage-summary.json'
          json-final-path: './coverage/ngx-pendo-schematics/coverage-final.json'
          vite-config-path: './projects/ngx-pendo/vitest.schematics.config.ts'
